project:
  name: "Crop Disease Classifier"
  version: "1.0.0"

data:
  dataset_name: "plantvillage"
  data_dir: "./data/plantvillage"
  image_size: 224
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 0          # 0 = main process (required on Windows; safe on all platforms)

model:
  architecture: "mobilenet_v3_small"   # lightest model, ideal for CPU inference
  pretrained: true
  num_classes: 38
  dropout: 0.3

training:
  epochs: 15
  batch_size: 16          # reduced for CPU memory comfort
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"     # cosine, step, plateau
  freeze_epochs: 3        # warm-up: train head only before unfreezing backbone
  early_stopping_patience: 7
  save_dir: "./models"
  seed: 42

augmentation:
  train:
    horizontal_flip: true
    vertical_flip: false
    rotation_limit: 30
    brightness_contrast: true
    blur: true
    normalize: true
  val:
    normalize: true

api:
  host: "0.0.0.0"
  port: 8000
  max_upload_size_mb: 10
  confidence_threshold: 0.3

classes:
  - "Apple___Apple_scab"
  - "Apple___Black_rot"
  - "Apple___Cedar_apple_rust"
  - "Apple___healthy"
  - "Blueberry___healthy"
  - "Cherry_(including_sour)___Powdery_mildew"
  - "Cherry_(including_sour)___healthy"
  - "Corn_(maize)___Cercospora_leaf_spot Gray_leaf_spot"
  - "Corn_(maize)___Common_rust_"
  - "Corn_(maize)___Northern_Leaf_Blight"
  - "Corn_(maize)___healthy"
  - "Grape___Black_rot"
  - "Grape___Esca_(Black_Measles)"
  - "Grape___Leaf_blight_(Isariopsis_Leaf_Spot)"
  - "Grape___healthy"
  - "Orange___Haunglongbing_(Citrus_greening)"
  - "Peach___Bacterial_spot"
  - "Peach___healthy"
  - "Pepper,_bell___Bacterial_spot"
  - "Pepper,_bell___healthy"
  - "Potato___Early_blight"
  - "Potato___Late_blight"
  - "Potato___healthy"
  - "Raspberry___healthy"
  - "Soybean___healthy"
  - "Squash___Powdery_mildew"
  - "Strawberry___Leaf_scorch"
  - "Strawberry___healthy"
  - "Tomato___Bacterial_spot"
  - "Tomato___Early_blight"
  - "Tomato___Late_blight"
  - "Tomato___Leaf_Mold"
  - "Tomato___Septoria_leaf_spot"
  - "Tomato___Spider_mites Two-spotted_spider_mite"
  - "Tomato___Target_Spot"
  - "Tomato___Tomato_Yellow_Leaf_Curl_Virus"
  - "Tomato___Tomato_mosaic_virus"
  - "Tomato___healthy"
