version: "3.9"

services:
  crop-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    image: crop-disease-classifier:latest
    container_name: crop_classifier
    ports:
      - "8000:8000"
    volumes:
      # Mount models directory so you can update the model without rebuilding
      - ./models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models/best_model.pth
      - HOST=0.0.0.0
      - PORT=8000
      - MAX_UPLOAD_MB=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: crop_nginx
    ports:
      - "80:80"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - crop-classifier
    profiles:
      - production
    restart: unless-stopped
